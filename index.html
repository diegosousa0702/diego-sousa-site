<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sua Agência Digital</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#0f0f0f;color:#fff;overflow-x:hidden}

header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(45deg,#0f0f0f,#1c1c1c);
}

h1{
font-size:3rem;
animation:fadeDown 1.2s ease forwards;
opacity:0;
}

p{
margin-top:20px;
font-size:1.2rem;
max-width:600px;
animation:fadeUp 1.5s ease forwards;
opacity:0;
}

button{
margin-top:30px;
padding:15px 35px;
border:none;
background:#25D366;
color:#000;
font-weight:700;
font-size:1rem;
border-radius:50px;
cursor:pointer;
transition:0.3s;
animation:fadeUp 1.8s ease forwards;
opacity:0;
}

button:hover{
transform:scale(1.1);
}

section{
padding:80px 20px;
text-align:center;
}

.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
margin-top:40px;
}

.card{
background:#1b1b1b;
padding:30px;
width:280px;
border-radius:15px;
transition:0.4s;
opacity:0;
transform:translateY(50px);
}

.card.show{
opacity:1;
transform:translateY(0);
}

.card:hover{
transform:translateY(-10px);
}

footer{
padding:40px;
text-align:center;
background:#111;
}

@keyframes fadeDown{
to{opacity:1;transform:translateY(0)}
from{opacity:0;transform:translateY(-40px)}
}

@keyframes fadeUp{
to{opacity:1;transform:translateY(0)}
from{opacity:0;transform:translateY(40px)}
}
</style>
</head>
<body>

<header>
<h1>Sites Profissionais e Automação de WhatsApp</h1>
<p>Eu crio sites modernos e automatizo o atendimento do seu WhatsApp para você vender todos os dias no automático.</p>
<button onclick="window.location.href='https://wa.me/5599999999999'">Falar no WhatsApp</button>
</header>

<section>
<h2>O que eu faço pelo seu negócio</h2>
<div class="cards">
<div class="card">Criação de Sites Modernos</div>
<div class="card">Automação de WhatsApp com IA</div>
<div class="card">Integração com Pagamentos</div>
</div>
</section>

<footer>
© 2026 Sua Agência Digital
</footer>

<script>
const cards = document.querySelectorAll('.card');

window.addEventListener('scroll', () => {
cards.forEach(card => {
const cardTop = card.getBoundingClientRect().top;
if(cardTop < window.innerHeight - 100){
card.classList.add('show');
}
});
});
</script>

</body>
</html>
